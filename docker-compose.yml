services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wb_operator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @wb/api dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wb_operator
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @wb/web dev"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      - api

volumes:
  postgres_data:
